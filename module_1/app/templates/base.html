<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %} | Mateus Pereira</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header>
        <div class="header-container">
            <nav class="navbar">
                <a href="{{ url_for('home.index') }}"
                   class="nav-link {% if request.endpoint == 'home.index' %}active{% endif %}">
                    Home
                </a>
                <a href="{{ url_for('contact.index') }}"
                   class="nav-link {% if request.endpoint == 'contact.index' %}active{% endif %}">
                    Contact
                </a>
                <a href="{{ url_for('projects.index') }}"
                   class="nav-link {% if request.endpoint == 'projects.index' %}active{% endif %}">
                    Projects
                </a>
            </nav>
        </div>
    </header>

    <main class="content">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Mateus Pereira &copy; 2025</p>
    </footer>

</body>
</html>
