<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Page title is set by each child template via the 'title' block -->
    <title>{% block title %}Portfolio{% endblock %} | Mateus Pereira</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header>
        <div class="header-container">
            <!--
                Navigation bar positioned at top-right.
                request.endpoint contains the current blueprint + function name (e.g. 'home.index').
                We compare it to each link's endpoint to add the 'active' CSS class,
                which visually highlights the tab the user is currently on.
            -->
            <nav class="navbar">
                <a href="{{ url_for('home.index') }}"
                   class="nav-link {% if request.endpoint == 'home.index' %}active{% endif %}">
                    Home
                </a>
                <a href="{{ url_for('contact.index') }}"
                   class="nav-link {% if request.endpoint == 'contact.index' %}active{% endif %}">
                    Contact
                </a>
                <a href="{{ url_for('projects.index') }}"
                   class="nav-link {% if request.endpoint == 'projects.index' %}active{% endif %}">
                    Projects
                </a>
            </nav>
        </div>
    </header>

    <!-- Each child template fills this block with its unique content -->
    <main class="content">
        {% block content %}{% endblock %}
    </main>


</body>
</html>
